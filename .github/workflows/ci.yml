name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Instalar navegador de Playwright
        run: npx playwright install --with-deps chromium

      - name: Smoke test end-to-end (extensión real)
        run: xvfb-run -a npm run test:e2e

      - name: Publicar extensión compilada
        uses: actions/upload-artifact@v4
        with:
          name: veladia-dist
          path: dist/
          if-no-files-found: error
