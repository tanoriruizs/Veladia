name: Actualizar listas de reputación

on:
  schedule:
    - cron: '0 6 * * *' # a diario, 06:00 UTC
  workflow_dispatch: {} # permite dispararlo manualmente

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Regenerar listas desde los feeds
        run: npm run update-lists

      - name: Recompilar dist con las listas nuevas
        run: npm run build

      - name: Commit y push si hay cambios
        run: |
          if [ -z "$(git status --porcelain src/data/allowlist.ts)" ]; then
            echo "Las listas no cambiaron; nada que commitear."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/allowlist.ts dist
          git commit -m "chore: actualizar listas de reputación y dist (automático)"
          git push
